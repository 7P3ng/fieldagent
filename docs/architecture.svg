<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="900" height="430" fill="#0A0A0B"/>
  <text x="28" y="40" fill="#F0F2F5" font-size="20" font-weight="600">FieldAgent — architecture</text>
  <text x="28" y="62" fill="#8A9099" font-size="12.5">chunk → focused taxonomy extraction → skeptic verification → dedupe/merge → structured findings (fully traced)</text>

  <!-- pipeline lane -->
  <g>
    <rect x="28" y="92" width="140" height="62" rx="8" fill="#111214" stroke="#1C1F24"/>
    <text x="98" y="120" fill="#F0F2F5" font-size="13" text-anchor="middle">Contract</text>
    <text x="98" y="138" fill="#555B66" font-size="10.5" text-anchor="middle">CUAD .txt</text>

    <rect x="196" y="92" width="140" height="62" rx="8" fill="#111214" stroke="#1C1F24"/>
    <text x="266" y="116" fill="#F0F2F5" font-size="13" text-anchor="middle">Chunker</text>
    <text x="266" y="134" fill="#555B66" font-size="10.5" text-anchor="middle">overlapping windows</text>
    <text x="266" y="148" fill="#555B66" font-size="10.5" text-anchor="middle">global offsets</text>

    <rect x="364" y="92" width="150" height="62" rx="8" fill="#111214" stroke="#00C9B1"/>
    <text x="439" y="116" fill="#00C9B1" font-size="13" text-anchor="middle">Extractor</text>
    <text x="439" y="134" fill="#8A9099" font-size="10.5" text-anchor="middle">15-type taxonomy</text>
    <text x="439" y="148" fill="#555B66" font-size="10.5" text-anchor="middle">fan-out per chunk</text>

    <rect x="542" y="92" width="150" height="62" rx="8" fill="#111214" stroke="#00C9B1"/>
    <text x="617" y="116" fill="#00C9B1" font-size="13" text-anchor="middle">Verifier</text>
    <text x="617" y="134" fill="#8A9099" font-size="10.5" text-anchor="middle">skeptic keep/drop</text>
    <text x="617" y="148" fill="#555B66" font-size="10.5" text-anchor="middle">cuts false positives</text>

    <rect x="720" y="92" width="152" height="62" rx="8" fill="#111214" stroke="#1C1F24"/>
    <text x="796" y="116" fill="#F0F2F5" font-size="13" text-anchor="middle">Findings</text>
    <text x="796" y="134" fill="#555B66" font-size="10.5" text-anchor="middle">type · span · severity</text>
    <text x="796" y="148" fill="#555B66" font-size="10.5" text-anchor="middle">risk note</text>

    <g stroke="#00C9B1" stroke-width="1.5" fill="none">
      <path d="M168 123 L196 123" marker-end="url(#a)"/>
      <path d="M336 123 L364 123" marker-end="url(#a)"/>
      <path d="M514 123 L542 123" marker-end="url(#a)"/>
      <path d="M692 123 L720 123" marker-end="url(#a)"/>
    </g>
  </g>

  <!-- kernel lane -->
  <rect x="28" y="196" width="844" height="74" rx="8" fill="#0E0F11" stroke="#1C1F24"/>
  <text x="44" y="220" fill="#8A9099" font-size="11.5" font-weight="600">VENDORED QUORUM KERNEL (core/)</text>
  <g font-size="11" fill="#8A9099">
    <text x="44" y="246">ModelClient seam — Fake / Recorded / DeepSeek / Anthropic</text>
    <text x="340" y="246">Orchestrator — fan-out + retry/backoff + degrade</text>
    <text x="640" y="246">SQLite tracing</text>
    <text x="44" y="262" fill="#555B66">every model call = a span (model · tokens · cost · latency · outcome)</text>
    <text x="640" y="262" fill="#555B66">pricing · bootstrap CIs</text>
  </g>

  <!-- eval lane -->
  <rect x="28" y="306" width="560" height="96" rx="8" fill="#111214" stroke="#1C1F24"/>
  <text x="44" y="330" fill="#F0F2F5" font-size="12.5" font-weight="600">EVAL (evals/) — span-IoU, no LLM judge</text>
  <text x="44" y="352" fill="#8A9099" font-size="11">arms: keyword · single-shot · pipeline−verifier · pipeline(full)</text>
  <text x="44" y="370" fill="#8A9099" font-size="11">F1 + per-type + bootstrap 95% CIs · agentic-lift + verifier ablation</text>
  <text x="44" y="388" fill="#555B66" font-size="11">dry-run default (recorded fixtures, $0) · live = FIELDAGENT_LIVE=1 + cost gate</text>

  <rect x="606" y="306" width="266" height="96" rx="8" fill="#111214" stroke="#1C1F24"/>
  <text x="622" y="330" fill="#F0F2F5" font-size="12.5" font-weight="600">DEMO (web/)</text>
  <text x="622" y="352" fill="#8A9099" font-size="11">inline-highlighted contracts</text>
  <text x="622" y="370" fill="#8A9099" font-size="11">gold-vs-predicted · results panel</text>
  <text x="622" y="388" fill="#555B66" font-size="11">static export → fieldagent.thomaspeng.ca</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#00C9B1"/>
    </marker>
  </defs>
</svg>
